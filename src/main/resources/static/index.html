<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spring AI Chat 테스트</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; height: 100vh; display: flex; background: #f4f5f7; }

  /* 사이드바 */
  #sidebar { width: 260px; background: #1f2430; color: #e6e8ee; display: flex; flex-direction: column; }
  #sidebar header { padding: 16px; font-weight: 700; border-bottom: 1px solid #333a4d; }
  #newRoomBtn { margin: 12px 16px; padding: 10px; border: none; border-radius: 8px; background: #4f7cff; color: white; font-size: 14px; cursor: pointer; }
  #newRoomBtn:hover { background: #3d66e0; }
  #roomList { flex: 1; overflow-y: auto; }
  .room { padding: 12px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
  .room:hover { background: #2a3143; }
  .room.active { background: #333c55; }
  .room .del { color: #7d8598; border: none; background: none; cursor: pointer; font-size: 13px; }
  .room .del:hover { color: #ff6b6b; }
  .room-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* 메인 */
  #main { flex: 1; display: flex; flex-direction: column; }
  #messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 12px; }
  .bubble { max-width: 70%; padding: 12px 16px; border-radius: 14px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; font-size: 14px; }
  .user { align-self: flex-end; background: #4f7cff; color: white; border-bottom-right-radius: 4px; }
  .assistant { align-self: flex-start; background: white; border: 1px solid #e2e4ea; border-bottom-left-radius: 4px; }
  .assistant.streaming::after { content: '▍'; animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  #inputBar { display: flex; gap: 8px; padding: 16px 24px; background: white; border-top: 1px solid #e2e4ea; }
  #msgInput { flex: 1; padding: 12px; border: 1px solid #cfd3dd; border-radius: 8px; font-size: 14px; font-family: inherit; resize: none; }
  #sendBtn { padding: 0 24px; border: none; border-radius: 8px; background: #4f7cff; color: white; font-size: 14px; cursor: pointer; }
  #sendBtn:disabled { background: #a9b7e0; cursor: not-allowed; }
  #placeholder { flex: 1; display: flex; align-items: center; justify-content: center; color: #9aa1b1; font-size: 15px; }
</style>
</head>
<body>
<aside id="sidebar">
  <header>Spring AI Chat</header>
  <button id="newRoomBtn">+ 새 채팅방</button>
  <div id="roomList"></div>
</aside>
<main id="main">
  <div id="placeholder">채팅방을 만들거나 선택하세요</div>
  <div id="messages" style="display:none"></div>
  <div id="inputBar" style="display:none">
    <textarea id="msgInput" rows="1" placeholder="메시지를 입력하세요 (Enter 전송)"></textarea>
    <button id="sendBtn">전송</button>
  </div>
</main>

<script>
const $ = (id) => document.getElementById(id);
let currentRoomId = null;
let sending = false;

async function api(path, options) {
  const res = await fetch(path, options);
  const body = await res.json();
  if (!body.success) throw new Error(body.message || '요청 실패');
  return body.data;
}

async function loadRooms() {
  const rooms = await api('/api/chat-rooms');
  const list = $('roomList');
  list.innerHTML = '';
  for (const room of rooms) {
    const div = document.createElement('div');
    div.className = 'room' + (room.id === currentRoomId ? ' active' : '');
    const title = document.createElement('span');
    title.className = 'room-title';
    title.textContent = room.title;
    const del = document.createElement('button');
    del.className = 'del';
    del.textContent = '✕';
    del.onclick = async (e) => {
      e.stopPropagation();
      await api('/api/chat-rooms/' + room.id, { method: 'DELETE' });
      if (room.id === currentRoomId) { currentRoomId = null; showPlaceholder(); }
      loadRooms();
    };
    div.append(title, del);
    div.onclick = () => selectRoom(room.id);
    list.appendChild(div);
  }
}

function showPlaceholder() {
  $('placeholder').style.display = 'flex';
  $('messages').style.display = 'none';
  $('inputBar').style.display = 'none';
}

async function selectRoom(roomId) {
  currentRoomId = roomId;
  $('placeholder').style.display = 'none';
  $('messages').style.display = 'flex';
  $('inputBar').style.display = 'flex';
  const messages = await api('/api/chat-rooms/' + roomId + '/messages');
  const box = $('messages');
  box.innerHTML = '';
  for (const m of messages) appendBubble(m.role === 'USER' ? 'user' : 'assistant', m.content);
  box.scrollTop = box.scrollHeight;
  loadRooms();
}

function appendBubble(cls, text) {
  const div = document.createElement('div');
  div.className = 'bubble ' + cls;
  div.textContent = text;
  $('messages').appendChild(div);
  $('messages').scrollTop = $('messages').scrollHeight;
  return div;
}

async function send() {
  const input = $('msgInput');
  const message = input.value.trim();
  if (!message || !currentRoomId || sending) return;
  sending = true;
  $('sendBtn').disabled = true;
  input.value = '';
  appendBubble('user', message);
  const bubble = appendBubble('assistant streaming', '');

  try {
    const res = await fetch('/api/chat-rooms/' + currentRoomId + '/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message })
    });
    if (!res.ok) throw new Error('요청 실패 (' + res.status + ')');

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      // SSE 이벤트는 빈 줄(\n\n)로 구분된다
      const events = buffer.split('\n\n');
      buffer = events.pop();
      for (const event of events) {
        const data = event.split('\n')
          .filter(line => line.startsWith('data:'))
          .map(line => line.slice(5).replace(/^ /, ''))
          .join('\n');
        bubble.textContent += data;
        $('messages').scrollTop = $('messages').scrollHeight;
      }
    }
  } catch (e) {
    bubble.textContent += '\n[오류] ' + e.message;
  } finally {
    bubble.classList.remove('streaming');
    sending = false;
    $('sendBtn').disabled = false;
    input.focus();
    // 첫 대화면 제목이 비동기로 생성되므로 잠시 후 목록을 갱신한다
    setTimeout(loadRooms, 4000);
    setTimeout(loadRooms, 12000);
  }
}

$('newRoomBtn').onclick = async () => {
  const room = await api('/api/chat-rooms', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title: '새 대화' })
  });
  await loadRooms();
  selectRoom(room.id);
};

$('sendBtn').onclick = send;
$('msgInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) { e.preventDefault(); send(); }
});

loadRooms();
</script>
</body>
</html>
