<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spring AI Chat 테스트</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; height: 100vh; display: flex; background: #f4f5f7; }

  /* 사이드바 */
  #sidebar { width: 260px; background: #1f2430; color: #e6e8ee; display: flex; flex-direction: column; }
  #sidebar header { padding: 16px; font-weight: 700; border-bottom: 1px solid #333a4d; }
  #newRoomBtn { margin: 12px 16px; padding: 10px; border: none; border-radius: 8px; background: #4f7cff; color: white; font-size: 14px; cursor: pointer; }
  #newRoomBtn:hover { background: #3d66e0; }
  #roomList { flex: 1; overflow-y: auto; }
  .room { padding: 12px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
  .room:hover { background: #2a3143; }
  .room.active { background: #333c55; }
  .room .del { color: #7d8598; border: none; background: none; cursor: pointer; font-size: 13px; }
  .room .del:hover { color: #ff6b6b; }
  .room-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* 메인 */
  #main { flex: 1; display: flex; flex-direction: column; }
  #messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 12px; }

  .msg-group { display: flex; flex-direction: column; max-width: 70%; gap: 4px; }
  .msg-group.user { align-self: flex-end; align-items: flex-end; }
  .msg-group.assistant { align-self: flex-start; align-items: flex-start; }
  .msg-group .bubble { max-width: 100%; }

  .bubble { max-width: 70%; padding: 12px 16px; border-radius: 14px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; font-size: 14px; }
  .bubble.user { align-self: flex-end; background: #4f7cff; color: white; border-bottom-right-radius: 4px; }
  .bubble.assistant { align-self: flex-start; background: white; border: 1px solid #e2e4ea; border-bottom-left-radius: 4px; }
  .bubble.streaming::after { content: '▍'; animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  .actions { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #9aa1b1; }
  .action-btn { border: none; background: none; cursor: pointer; color: #9aa1b1; font-size: 14px; padding: 2px 4px; }
  .action-btn:hover { color: #4f7cff; }
  .sibling-nav { display: flex; align-items: center; gap: 2px; }
  .sibling-nav button { border: none; background: none; cursor: pointer; color: #9aa1b1; font-size: 13px; padding: 0 2px; }
  .sibling-nav button:disabled { opacity: 0.3; cursor: default; }

  .retry-row { align-self: center; }
  .retry-btn { border: 1px solid #cfd3dd; background: white; border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: 13px; color: #4f7cff; }
  .retry-btn:hover { background: #eef2ff; }

  .edit-textarea { width: 100%; min-width: 240px; padding: 10px; border-radius: 8px; border: 1px solid #cfd3dd; font-family: inherit; font-size: 14px; resize: vertical; }
  .edit-actions { display: flex; gap: 6px; }
  .edit-actions button { border: none; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 12px; }
  .edit-actions .save { background: #4f7cff; color: white; }
  .edit-actions .cancel { background: #e2e4ea; color: #333; }

  #inputBar { display: flex; gap: 8px; padding: 16px 24px; background: white; border-top: 1px solid #e2e4ea; }
  #msgInput { flex: 1; padding: 12px; border: 1px solid #cfd3dd; border-radius: 8px; font-size: 14px; font-family: inherit; resize: none; }
  #sendBtn { padding: 0 24px; border: none; border-radius: 8px; background: #4f7cff; color: white; font-size: 14px; cursor: pointer; }
  #sendBtn:disabled { background: #a9b7e0; cursor: not-allowed; }
  #placeholder { flex: 1; display: flex; align-items: center; justify-content: center; color: #9aa1b1; font-size: 15px; }
</style>
</head>
<body>
<aside id="sidebar">
  <header>Spring AI Chat</header>
  <button id="newRoomBtn">+ 새 채팅방</button>
  <div id="roomList"></div>
</aside>
<main id="main">
  <div id="placeholder">채팅방을 만들거나 선택하세요</div>
  <div id="messages" style="display:none"></div>
  <div id="inputBar" style="display:none">
    <textarea id="msgInput" rows="1" placeholder="메시지를 입력하세요 (Enter 전송)"></textarea>
    <button id="sendBtn">전송</button>
  </div>
</main>

<script>
const $ = (id) => document.getElementById(id);
let currentRoomId = null;
let currentMessages = [];
let sending = false;

async function api(path, options) {
  const res = await fetch(path, options);
  const body = await res.json();
  if (!body.success) throw new Error(body.message || '요청 실패');
  return body.data;
}

async function loadRooms() {
  const rooms = await api('/api/chat-rooms');
  const list = $('roomList');
  list.innerHTML = '';
  for (const room of rooms) {
    const div = document.createElement('div');
    div.className = 'room' + (room.id === currentRoomId ? ' active' : '');
    const title = document.createElement('span');
    title.className = 'room-title';
    title.textContent = room.title;
    const del = document.createElement('button');
    del.className = 'del';
    del.textContent = '✕';
    del.onclick = async (e) => {
      e.stopPropagation();
      await api('/api/chat-rooms/' + room.id, { method: 'DELETE' });
      if (room.id === currentRoomId) { currentRoomId = null; showPlaceholder(); }
      loadRooms();
    };
    div.append(title, del);
    div.onclick = () => selectRoom(room.id);
    list.appendChild(div);
  }
}

function showPlaceholder() {
  $('placeholder').style.display = 'flex';
  $('messages').style.display = 'none';
  $('inputBar').style.display = 'none';
}

async function selectRoom(roomId) {
  currentRoomId = roomId;
  $('placeholder').style.display = 'none';
  $('messages').style.display = 'flex';
  $('inputBar').style.display = 'flex';
  await refreshMessages();
  loadRooms();
}

async function refreshMessages() {
  const messages = await api('/api/chat-rooms/' + currentRoomId + '/messages');
  renderMessages(messages);
  return messages;
}

function renderMessages(messages) {
  currentMessages = messages;
  const box = $('messages');
  box.innerHTML = '';
  messages.forEach((m, idx) => box.appendChild(createMessageGroup(m, idx)));

  // 활성 경로의 마지막이 자식 없는 USER 메시지면(응답 실패 등) 재시도 버튼을 보여준다
  const last = messages[messages.length - 1];
  if (last && last.role === 'USER') {
    box.appendChild(createRetryRow(last.id));
  }
  box.scrollTop = box.scrollHeight;
}

function createMessageGroup(m, idx) {
  const group = document.createElement('div');
  group.className = 'msg-group ' + (m.role === 'USER' ? 'user' : 'assistant');

  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + (m.role === 'USER' ? 'user' : 'assistant');
  bubble.textContent = m.content;
  group.appendChild(bubble);

  const actions = document.createElement('div');
  actions.className = 'actions';

  if (m.siblingCount > 1) {
    actions.appendChild(createSiblingNav(m));
  }

  const actionBtn = document.createElement('button');
  actionBtn.className = 'action-btn';
  if (m.role === 'USER') {
    actionBtn.textContent = '✎';
    actionBtn.title = '편집 후 재전송';
    actionBtn.onclick = () => startEdit(group, m);
  } else {
    actionBtn.textContent = '⟳';
    actionBtn.title = '다시 생성';
    actionBtn.onclick = () => regenerateStream(currentMessages[idx - 1].id);
  }
  actions.appendChild(actionBtn);

  group.appendChild(actions);
  return group;
}

function createSiblingNav(m) {
  const nav = document.createElement('span');
  nav.className = 'sibling-nav';

  const prev = document.createElement('button');
  prev.textContent = '‹';
  prev.disabled = m.siblingIndex <= 1;
  prev.onclick = () => switchBranch(m.siblingMessageIds[m.siblingIndex - 2]);

  const label = document.createElement('span');
  label.textContent = m.siblingIndex + '/' + m.siblingCount;

  const next = document.createElement('button');
  next.textContent = '›';
  next.disabled = m.siblingIndex >= m.siblingCount;
  next.onclick = () => switchBranch(m.siblingMessageIds[m.siblingIndex]);

  nav.append(prev, label, next);
  return nav;
}

function createRetryRow(userMessageId) {
  const row = document.createElement('div');
  row.className = 'retry-row';
  const btn = document.createElement('button');
  btn.className = 'retry-btn';
  btn.textContent = '⟳ 다시 시도';
  btn.onclick = () => regenerateStream(userMessageId);
  row.appendChild(btn);
  return row;
}

function startEdit(group, m) {
  group.innerHTML = '';

  const textarea = document.createElement('textarea');
  textarea.className = 'edit-textarea';
  textarea.value = m.content;
  textarea.rows = 3;

  const actionsRow = document.createElement('div');
  actionsRow.className = 'edit-actions';
  const saveBtn = document.createElement('button');
  saveBtn.className = 'save';
  saveBtn.textContent = '전송';
  saveBtn.onclick = () => submitEdit(m.id, textarea.value.trim());
  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'cancel';
  cancelBtn.textContent = '취소';
  cancelBtn.onclick = () => renderMessages(currentMessages);
  actionsRow.append(saveBtn, cancelBtn);

  group.append(textarea, actionsRow);
  textarea.focus();
}

async function switchBranch(messageId) {
  const messages = await api('/api/chat-rooms/' + currentRoomId + '/active-branch', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messageId })
  });
  renderMessages(messages);
}

function appendBubble(cls, text) {
  const div = document.createElement('div');
  div.className = 'bubble ' + cls;
  div.textContent = text;
  $('messages').appendChild(div);
  $('messages').scrollTop = $('messages').scrollHeight;
  return div;
}

async function streamAndRefresh(url, body) {
  const bubble = appendBubble('assistant streaming', '');

  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: body ? JSON.stringify(body) : undefined
    });
    if (!res.ok) throw new Error('요청 실패 (' + res.status + ')');

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      // SSE 이벤트는 빈 줄(\n\n)로 구분된다
      const events = buffer.split('\n\n');
      buffer = events.pop();
      for (const event of events) {
        const data = event.split('\n')
          .filter(line => line.startsWith('data:'))
          .map(line => line.slice(5).replace(/^ /, ''))
          .join('\n');
        bubble.textContent += data;
        $('messages').scrollTop = $('messages').scrollHeight;
      }
    }
  } catch (e) {
    bubble.textContent += '\n[오류] ' + e.message;
  } finally {
    // 스트림 완료 후 서버의 최종 상태(id, 형제 정보)로 다시 렌더링한다
    await refreshMessages();
    // 첫 대화면 제목이 비동기로 생성되므로 잠시 후 목록을 갱신한다
    setTimeout(loadRooms, 4000);
    setTimeout(loadRooms, 12000);
  }
}

async function send() {
  const input = $('msgInput');
  const message = input.value.trim();
  if (!message || !currentRoomId || sending) return;
  sending = true;
  $('sendBtn').disabled = true;
  input.value = '';
  appendBubble('user', message);

  await streamAndRefresh('/api/chat-rooms/' + currentRoomId + '/chat/stream', { message });

  sending = false;
  $('sendBtn').disabled = false;
  input.focus();
}

async function regenerateStream(userMessageId) {
  if (!currentRoomId || sending) return;
  sending = true;
  await streamAndRefresh('/api/chat-rooms/' + currentRoomId + '/messages/' + userMessageId + '/regenerate/stream');
  sending = false;
}

async function submitEdit(userMessageId, newContent) {
  if (!newContent || !currentRoomId || sending) return;
  sending = true;
  await streamAndRefresh(
    '/api/chat-rooms/' + currentRoomId + '/messages/' + userMessageId + '/edit/stream',
    { content: newContent }
  );
  sending = false;
}

$('newRoomBtn').onclick = async () => {
  const room = await api('/api/chat-rooms', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title: '새 대화' })
  });
  await loadRooms();
  selectRoom(room.id);
};

$('sendBtn').onclick = send;
$('msgInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) { e.preventDefault(); send(); }
});

loadRooms();
</script>
</body>
</html>
